global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: code-review-copilot-app
    metrics_path: /api/metrics
    scheme: http
    bearer_token_file: /etc/prometheus/monitoring-token
    static_configs:
      - targets:
          - app:3000

  - job_name: code-review-copilot-health
    metrics_path: /api/health
    bearer_token_file: /etc/prometheus/monitoring-token
    params:
      scope:
        - liveness
    static_configs:
      - targets:
          - app:3000

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
