services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: code-review-copilot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgresql://code_review:code_review@postgres:5432/code_review_copilot?schema=public
      APP_AUTH_USERNAME: ${APP_AUTH_USERNAME:?APP_AUTH_USERNAME is required}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET:?APP_AUTH_SECRET is required}
      APP_AUTH_SESSION_SECRET: ${APP_AUTH_SESSION_SECRET:?APP_AUTH_SESSION_SECRET is required}
      APP_AUTH_IP_WHITELIST: ${APP_AUTH_IP_WHITELIST:-}
      # 审查工作区：agent clone 仓库并按 commit 建 worktree（持久化避免重启重 clone）
      WORKSPACE_ROOT: /app/.workspaces
    ports:
      - "8787:8787"
    volumes:
      - workspace_data:/app/.workspaces

  postgres:
    image: postgres:16-alpine
    container_name: code-review-copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: code_review
      POSTGRES_PASSWORD: code_review
      POSTGRES_DB: code_review_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U code_review -d code_review_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  workspace_data:
