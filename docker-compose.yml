services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: code-review-copilot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://code_review:code_review@postgres:5432/code_review_copilot?schema=public
      APP_AUTH_USERNAME: ${APP_AUTH_USERNAME:?APP_AUTH_USERNAME is required}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET:?APP_AUTH_SECRET is required}
      APP_AUTH_SESSION_SECRET: ${APP_AUTH_SESSION_SECRET:?APP_AUTH_SESSION_SECRET is required}
      APP_AUTH_IP_WHITELIST: ${APP_AUTH_IP_WHITELIST:-}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      BUBBLEWRAP_BIN: ${BUBBLEWRAP_BIN:-bwrap}
      BUBBLEWRAP_WORKSPACE_ROOT: ${BUBBLEWRAP_WORKSPACE_ROOT:-/var/lib/code-review-copilot/runtime}
      PI_HOST_PATH: ${PI_HOST_PATH:-/opt/pi}
      PI_SANDBOX_MOUNT_PATH: ${PI_SANDBOX_MOUNT_PATH:-/opt/pi}
      PI_SANDBOX_TIMEOUT_SECONDS: ${PI_SANDBOX_TIMEOUT_SECONDS:-7200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    ports:
      - "3000:3000"
    volumes:
      - pi_runtime_workspace:/var/lib/code-review-copilot/runtime
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Authorization: Bearer $$APP_AUTH_SECRET\" 'http://localhost:3000/api/health?scope=liveness' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: code-review-copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: code_review
      POSTGRES_PASSWORD: code_review
      POSTGRES_DB: code_review_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U code_review -d code_review_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  pi_runtime_workspace:
